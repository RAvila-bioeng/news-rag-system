  - name: Example Generic News API
    enabled: false
    type: generic-json
    url: https://example.com/news
    method: GET
    headers:
      Authorization: "Bearer ${EXAMPLE_API_KEY}"
    params: {}
    responseMapping:
      articlesPath: $.data.items
      title: $.headline
      content: $.summary
      url: $.link
      source: $.publisher
      timestamp: $.published_at
