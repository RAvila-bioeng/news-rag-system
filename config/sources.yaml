sources:
  - name: NewsAPI Technology
    enabled: true
    type: generic-json
    url: https://newsapi.org/v2/top-headlines
    method: GET
    headers:
      User-Agent: "news-rag-system/0.1 (Roberto Avila; local development)"
      X-Api-Key: "${NEWS_API_KEY}"
    params:
      country: us
      category: technology
      pageSize: "10"
    responseMapping:
      articlesPath: $.articles
      title: $.title
      content: $.description
      url: $.url
      source: $.source.name
      timestamp: $.publishedAt
    schedule: "0 0 8 * * ?"

