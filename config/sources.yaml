  - name: NewsAPI Health
    enabled: true
    type: generic-json
    url: https://newsapi.org/v2/top-headlines
    method: GET
    headers:
      User-Agent: "news-rag-system/0.1 (Roberto Avila; local development)"
      X-Api-Key: "${NEWS_API_KEY}"
    params:
