micronaut:
  application:
    name: search-service
  server:
    port: 8082
  serde:
    serialization:
      inclusion: NON_NULL

opensearch:
  url: http://localhost:9200
  index: news_article

embedding:
  provider: openai
  model: text-embedding-3-small
  dimensions: 384
  api-key: ${OPENAI_API_KEY:}

search:
  default-top-k: 5
