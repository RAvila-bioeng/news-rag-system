micronaut:
  application:
    name: search-service
  server:
    port: 8082
  serde:
    serialization:
      inclusion: NON_NULL
  router:
    static-resources:
      default:
        enabled: true
        mapping: /**
        paths: classpath:public

opensearch:
  url: http://localhost:9200
  index: news_article

embedding:
  provider: ${EMBEDDING_PROVIDER:openai}
  dimensions: ${EMBEDDING_DIMENSIONS:384}
  model: ${EMBEDDING_MODEL:text-embedding-3-small}
