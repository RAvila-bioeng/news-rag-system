micronaut:
  application:
    name: news-ingestion-service
  server:
    port: 8081

opensearch:
  url: http://localhost:9200
  index: news_article

embedding:
  provider: ${EMBEDDING_PROVIDER:openai}
  dimensions: ${EMBEDDING_DIMENSIONS:384}
  model: ${EMBEDDING_MODEL:text-embedding-3-small}

sentiment:
  provider: ${SENTIMENT_PROVIDER:simple}
  model: ${SENTIMENT_MODEL:gpt-4.1-mini}
  max-text-chars: ${SENTIMENT_MAX_TEXT_CHARS:3000}

ingestion:
  http:
    max-retries: ${INGESTION_HTTP_MAX_RETRIES:3}
    retry-delay-ms: ${INGESTION_HTTP_RETRY_DELAY_MS:500}
  scheduler:
    enabled: true
    cron: "0 0 8 * * ?"
